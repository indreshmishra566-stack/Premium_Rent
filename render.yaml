# Render Blueprint — one-click deploy for backend + frontend.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: luxury-car-rental-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/cars/
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://*.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set this to your frontend URL after first deploy.
      - key: DATABASE_URL
        fromDatabase:
          name: luxury-car-rental-db
          property: connectionString

  - type: web
    name: luxury-car-rental-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false  # Set this to your backend URL (e.g. https://luxury-car-rental-backend.onrender.com).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

databases:
  - name: luxury-car-rental-db
    plan: free
    databaseName: luxury_car_rental
    user: luxury
