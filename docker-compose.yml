services:
  backend:
    build:
      context: ./backend
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,backend"
      SQLITE_PATH: "/data/db.sqlite3"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/cars/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: "http://127.0.0.1:8000"
    environment:
      PORT: "80"
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  backend_data:
